# UGROW Platform - Docker Compose Configuration
# SRS Requirement: All services containerized via Docker Compose
# Single command to start: docker-compose up -d

version: '3.8'

services:
  # ============================================
  # PostgreSQL Database
  # ============================================
  postgres:
    image: postgres:15-alpine
    container_name: ugrow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ugrow_db
      POSTGRES_USER: ugrow
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ugrow_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ugrow -d ugrow_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ugrow-network

  # ============================================
  # Backend API (FastAPI)
  # ============================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ugrow-backend
    restart: unless-stopped
    environment:
      - ENVIRONMENT=production
      - DEBUG=false
      - PORT=8000
      - DATABASE_URL=postgresql://ugrow:${DB_PASSWORD:-ugrow_password}@postgres:5432/ugrow_db
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-change-this-secret-key-in-production}
      - PLATFORM_CREDENTIALS_ENCRYPTION_KEY=${PLATFORM_CREDENTIALS_ENCRYPTION_KEY}
      - CORS_ALLOWED_ORIGINS=http://localhost:3000,http://frontend:3000
      - STORAGE_TYPE=local
      - LOCAL_STORAGE_PATH=/app/storage
      - MASTER_SHEET_TEMPLATE_PATH=/app/templates/Master_Sheet.xlsx
      - EXPORTS_OUTPUT_PATH=/app/exports
      - LOG_LEVEL=INFO
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@ugrow.com}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-ugrow1@@}
    volumes:
      - ./storage:/app/storage
      - ./exports:/app/exports
      - ./templates:/app/templates:ro
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - ugrow-network

  # ============================================
  # Frontend (Next.js)
  # ============================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ugrow-frontend
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000
      - NEXT_PUBLIC_DEFAULT_LOCALE=en
      - NEXT_PUBLIC_SUPPORTED_LOCALES=en,ar
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - ugrow-network

  # ============================================
  # Nginx Reverse Proxy (Production)
  # ============================================
  nginx:
    image: nginx:alpine
    container_name: ugrow-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./storage:/var/www/storage:ro
    depends_on:
      - frontend
      - backend
    networks:
      - ugrow-network
    profiles:
      - production  # Only start with: docker-compose --profile production up

  # ============================================
  # Redis (Optional - for caching/sessions)
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: ugrow-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - ugrow-network
    profiles:
      - redis  # Only start with: docker-compose --profile redis up

# ============================================
# Volumes
# ============================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

# ============================================
# Networks
# ============================================
networks:
  ugrow-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16